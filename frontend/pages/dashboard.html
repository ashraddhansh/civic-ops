<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Civic Issues Reporter - Dashboard</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/dashboard.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
                <header class="header">
            <div class="nav">
                <h1>🏛️ Civic Issues Reporter</h1>
                <div class="nav-actions">
                    <span id="userInfo">Loading...</span>
                    <button id="logoutBtn" class="btn btn-secondary">Logout</button>
                </div>
            </div>
        </header>

        <!-- Navigation -->
        <nav class="nav-tabs">
            <button class="nav-tab active" data-tab="dashboard">Dashboard</button>
            <button class="nav-tab" data-tab="my-issues">My Issues</button>
            <button class="nav-tab" data-tab="report-issue">Report Issue</button>
        </nav>

        <!-- Dashboard Tab -->
        <div id="dashboard" class="tab-content active">
            <div class="dashboard-stats">
                <div class="stat-card">
                    <h3 id="totalIssues">0</h3>
                    <p>Total Issues Reported</p>
                </div>
                <div class="stat-card">
                    <h3 id="pendingIssues">0</h3>
                    <p>Pending Issues</p>
                </div>
                <div class="stat-card">
                    <h3 id="resolvedIssues">0</h3>
                    <p>Resolved Issues</p>
                </div>
            </div>
            <div class="quick-actions">
                <button class="btn btn-primary btn-large" onclick="switchTab('report-issue')">
                    📝 Report New Issue
                </button>
            </div>
        </div>

        <!-- My Issues Tab -->
        <div id="my-issues" class="tab-content">
            <div class="tab-header">
                <h2>My Reported Issues</h2>
                <button id="refreshIssues" class="btn btn-secondary">🔄 Refresh</button>
            </div>
            <div id="issuesList" class="issues-list">
                <!-- Issues will be loaded here -->
            </div>
        </div>

        <!-- Report Issue Tab -->
        <div id="report-issue" class="tab-content">
            <div class="tab-header">
                <h2>Report New Issue</h2>
            </div>
            <form id="reportIssueForm" class="report-form">
                <div class="form-group">
                    <label for="issueTitle">Issue Title *</label>
                    <input type="text" id="issueTitle" placeholder="Brief description of the issue" required>
                </div>
                
                <div class="form-group">
                    <label for="issueDescription">Detailed Description *</label>
                    <textarea id="issueDescription" rows="4" placeholder="Provide detailed information about the issue" required></textarea>
                </div>
                
                <div class="form-group">
                    <label for="issueCategory">Category *</label>
                    <select id="issueCategory" required>
                        <option value="">Select a category</option>
                        <option value="road">🛣️ Road Issues</option>
                        <option value="water">💧 Water Problems</option>
                        <option value="electricity">⚡ Electricity Issues</option>
                        <option value="waste">🗑️ Waste Management</option>
                        <option value="public_safety">🚨 Public Safety</option>
                        <option value="infrastructure">🏗️ Infrastructure</option>
                        <option value="other">📋 Other</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label for="issueLocation">Location</label>
                    <input type="text" id="issueLocation" placeholder="Address or landmark">
                    <button type="button" id="getLocationBtn" class="btn btn-secondary btn-small">📍 Get Current Location</button>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label for="latitude">Latitude</label>
                        <input type="number" id="latitude" step="any" placeholder="GPS Latitude">
                    </div>
                    <div class="form-group">
                        <label for="longitude">Longitude</label>
                        <input type="number" id="longitude" step="any" placeholder="GPS Longitude">
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="issuePhoto">Photo (optional)</label>
                    <input type="file" id="issuePhoto" accept="image/*">
                    <div id="photoPreview" class="file-preview"></div>
                </div>
                
                <div class="form-group">
                    <label for="voiceNote">Voice Note (optional)</label>
                    <input type="file" id="voiceNote" accept="audio/*">
                    <div id="voicePreview" class="file-preview"></div>
                </div>
                
                <button type="submit" class="btn btn-primary btn-large">📤 Submit Issue</button>
            </form>
        </div>

        <!-- Loading Overlay -->
        <div id="loadingOverlay" class="loading-overlay hidden">
            <div class="loading">
                <div class="spinner"></div>
                <p>Processing...</p>
            </div>
        </div>

        <!-- Message Container -->
        <div id="messageContainer" class="message-container"></div>

        <!-- Issue Details Modal -->
        <div id="issueModal" class="modal hidden">
            <div class="modal-content">
                <div class="modal-header">
                    <h3>Issue Details</h3>
                    <button class="modal-close">&times;</button>
                </div>
                <div id="issueDetails" class="modal-body">
                    <!-- Issue details will be loaded here -->
                </div>
            </div>
        </div>
    </div>

    <script src="../js/config.js"></script>
    <script src="../js/utils.js"></script>
    <script src="../js/app.js"></script>
</body>
</html>
