<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Civic Issues Reporter - Login</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/auth.css">
</head>
<body>
    <div class="container">
        <div class="auth-container">
            <div class="auth-header">
                <h1>🏛️ Civic Issues Reporter</h1>
                <p>Report civic issues in your community</p>
            </div>

            <!-- Phone Number Section -->
            <div id="phoneSection" class="auth-form">
                <h2>Login with Phone</h2>
                <form id="phoneForm">
                    <div class="form-group">
                        <label for="phoneNumber">Phone Number</label>
                        <input type="tel" id="phoneNumber" placeholder="9876543210" required maxlength="10">
                    </div>
                    <button type="submit" class="btn btn-primary">Send OTP</button>
                </form>
            </div>

            <!-- OTP Verification Section (hidden initially) -->
            <div id="otpSection" class="auth-form" style="display: none;">
                <h2>Verify OTP</h2>
                <p id="otpMessage">Enter the OTP sent to your phone</p>
                <form id="otpForm">
                    <div class="form-group">
                        <label for="otp">OTP Code</label>
                        <input type="text" id="otp" maxlength="6" placeholder="123456" required>
                    </div>
                    <button type="submit" class="btn btn-primary">Verify OTP</button>
                    <button type="button" onclick="location.reload()" class="btn btn-secondary">Back</button>
                </form>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
